name: Renovate

on:
  schedule:
    - cron: '30 3 * * *' # 03:30 UTC, adjust if a different window is desired
  workflow_dispatch:
  push:
    branches:
      - main
      - master
      - dev
    paths:
      - renovate.json

permissions:
  contents: write
  pull-requests: write
  issues: write

concurrency:
  group: renovate
  cancel-in-progress: true

jobs:
  renovate:
    name: Run Renovate
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v7

      - name: Validate Renovate token
        env:
          RENOVATE_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
          GH_TOKEN: ${{ secrets.RENOVATE_TOKEN }}
        run: |
          if [ -z "$RENOVATE_TOKEN" ]; then
            echo "::error::Repository secret RENOVATE_TOKEN is not configured."
            exit 1
          fi

          gh api rate_limit >/dev/null

      - name: Self-hosted Renovate
        uses: renovatebot/github-action@v46.1.17
        with:
          configurationFile: renovate.json
          token: ${{ secrets.RENOVATE_TOKEN }}
        env:
          LOG_LEVEL: info
          RENOVATE_REPOSITORIES: ${{ github.repository }}
